# Workflow untuk Week 12 - Continuous Code Inspection dengan SonarCloud.
#
# SEBELUM DIPAKAI, lakukan ini dulu:
# 1. Buat akun di https://sonarcloud.io (login pakai GitHub).
# 2. Buat Organization, lalu import repository ini.
# 3. Buat token analisis di SonarCloud (My Account > Security > Generate Token).
# 4. Di repo GitHub: Settings > Secrets and variables > Actions > New repository secret
#    dengan nama SONAR_TOKEN, isi token tadi.
# 5. Ganti nilai -Dsonar.organization dan -Dsonar.projectKey di bawah
#    dengan milikmu (lihat di dashboard SonarCloud project kamu).

name: SonarCloud Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # diperlukan agar analisis blame/coverage akurat

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build, test, and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=GANTI-DENGAN-ORG-SONARCLOUD-KAMU
          -Dsonar.projectKey=GANTI-DENGAN-PROJECT-KEY-KAMU
